<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חנן גרפיקס - תיק עבודות</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* רקע לבן נקי לחלוטין */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .gallery-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* אזורי הלחיצה הבלתי נראים */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 10;
            background: rgba(0, 0, 0, 0);
            cursor: pointer;
        }

        .zone-left { left: 0; }
        .zone-right { right: 0; }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="click-zone zone-left" id="btn-prev"></div>
        <div class="click-zone zone-right" id="btn-next"></div>
        
        <img id="gallery-img" src="" alt="מודעה - חנן גרפיקס">
    </div>

<script>
    let currentImage = 1;
    const totalImages = 7;
    const imgElement = document.getElementById('gallery-img');

    function getAbsoluteImageUrl() {
        const currentUrl = window.location.href;
        let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
        return baseUrl + 'slides/' + currentImage + '.jpg';
    }

    function updateImage() {
        imgElement.src = getAbsoluteImageUrl();
    }

    function changeImage(step) {
        currentImage += step;
        
        if (currentImage > totalImages) currentImage = 1;
        if (currentImage < 1) currentImage = totalImages;
        
        updateImage();
    }

    document.getElementById('btn-next').addEventListener('click', () => changeImage(1));
    document.getElementById('btn-prev').addEventListener('click', () => changeImage(-1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') changeImage(1);
        if (e.key === 'ArrowLeft') changeImage(-1);
    });

    updateImage();
</script>
</body>
</html>
