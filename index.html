<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Ads Presentation</title>
    <style>
        /* איפוס שוליים ומסך מלא נקי */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* רקע שחור למראה מקצועי */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            user-select: none;
        }

        /* מכל המצגת - תופס את כל גודל הדפדפן */
        .presentation-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* הגדרת השקופיות - מותאמות למסך בלי עיוות */
        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* מוסתר כברירת מחדל */
        }

        /* השקופית הפעילה שמוצגת כרגע */
        .slide-img.active {
            display: block;
        }

        /* אזורי הלחיצה הבלתי נראים על המסך */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            z-index: 10;
            background: rgba(255, 255, 255, 0); /* שקוף לחלוטין */
            cursor: pointer;
        }

        /* חצי מסך שמאלי - מחזיר אחורה */
        .zone-left {
            left: 0;
            width: 50%;
        }

        /* חצי מסך ימני - מעביר קדימה */
        .zone-right {
            right: 0;
            width: 50%;
        }
    </style>
</head>
<body>

<div class="presentation-container">
    <div class="click-zone zone-left" id="prevBtn" title="שקופית קודמת"></div>
    <div class="click-zone zone-right" id="nextBtn" title="שקופית הבאה"></div>

    <div id="slides-wrapper">
        <img src="1.jpg" class="slide-img active" alt="Slide 1">
        <img src="2.jpg" class="slide-img" alt="Slide 2">
        <img src="3.jpg" class="slide-img" alt="Slide 3">
        <img src="4.jpg" class="slide-img" alt="Slide 4">
        <img src="5.jpg" class="slide-img" alt="Slide 5">
        <img src="6.jpg" class="slide-img" alt="Slide 6">
        <img src="7.jpg" class="slide-img" alt="Slide 7">
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide-img');
    let currentIndex = 0; // מתחיל תמיד מהשקופית הראשונה (אינדקס 0)

    function showSlide(index) {
        // הסרת השקופית הנוכחית מהמסך
        slides[currentIndex].classList.remove('active');
        
        // עדכון המיקום החדש
        currentIndex = index;
        
        // הצגת השקופית החדשה
        slides[currentIndex].classList.add('active');
    }

    // ניווט מעגלי קדימה (בלחיצה על ימין)
    function nextSlide() {
        let nextIndex = (currentIndex + 1) % slides.length;
        showSlide(nextIndex);
    }

    // ניווט מעגלי אחורה (בלחיצה על שמאל)
    function prevSlide() {
        let prevIndex = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(prevIndex);
    }

    // חיבור הלחיצות לאזורים השקופים
    document.getElementById('nextBtn').addEventListener('click', nextSlide);
    document.getElementById('prevBtn').addEventListener('click', prevSlide);

    // תמיכה במקשי החיצים במקלדת (ימין ושמאל) לשימוש נוח
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
            nextSlide();
        } else if (e.key === 'ArrowLeft') {
            prevSlide();
        }
    });
</script>
</body>
</html>
