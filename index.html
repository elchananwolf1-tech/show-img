<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיק עבודות - מודעות סטטיות</title>
    <style>
        /* איפוס מסך מלא */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* רקע שחור נקי */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .gallery-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* עיצוב התמונה שתתאים בדיוק למסך בנוטישן */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* שומר על פרופורציות המודעה בלי למתוח אותה */
        }

        /* אזורי הלחיצה השקופים */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 10;
            background: rgba(0, 0, 0, 0); /* שקוף לחלוטין */
            cursor: pointer;
        }

        .zone-left { left: 0; }   /* חצי מסך שמאלי - אחורה */
        .zone-right { right: 0; } /* חצי מסך ימני - קדימה */
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="click-zone zone-left" id="btn-prev"></div>
        <div class="click-zone zone-right" id="btn-next"></div>
        
        <img id="gallery-img" src="slides/1.jpg" alt="Presentation Slide">
    </div>

<script>
    let currentImage = 1;
    const totalImages = 7;
    const imgElement = document.getElementById('gallery-img');

    // פונקציה להחלפת התמונה
    function changeImage(step) {
        currentImage += step;
        
        // לוגיקה מעגלית
        if (currentImage > totalImages) {
            currentImage = 1; // חוזר להתחלה
        } else if (currentImage < 1) {
            currentImage = totalImages; // קופץ לסוף
        }
        
        // עדכון מקור התמונה מתוך תיקיית slides
        imgElement.src = `slides/${currentImage}.jpg`;
    }

    // חיבור אירועי לחיצה לאזורים השקופים
    document.getElementById('btn-next').addEventListener('click', () => changeImage(1));
    document.getElementById('btn-prev').addEventListener('click', () => changeImage(-1));

    // גיבוי למקרה שהתמונות בגיטהאב נשמרו עם סיומת JPG גדולה בתוך התיקייה
    imgElement.onerror = function() {
        if (this.src.endsWith('.jpg')) {
            this.src = `slides/${currentImage}.JPG`;
        }
    };

    // תמיכה בחיצי המקלדת
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') changeImage(1);
        if (e.key === 'ArrowLeft') changeImage(-1);
    });
</script>
</body>
</html>
