<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיק עבודות - מודעות סטטיות</title>
    <style>
        /* איפוס מסך כדי שהכל יישב בול בתוך נוטישן */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* אזורי הלחיצה הבלתי נראים - חצי ימין חצי שמאל */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 10;
            background: rgba(0, 0, 0, 0);
            cursor: pointer;
        }

        .zone-left { left: 0; }
        .zone-right { right: 0; }
    </style>
</head>
<body>

    <div class="click-zone zone-left" id="btn-prev"></div>
    <div class="click-zone zone-right" id="btn-next"></div>
    
    <img id="gallery-img" src="slides/1.jpg" alt="מודעה 1">

<script>
    let currentImage = 1;
    const totalImages = 7;
    const imgElement = document.getElementById('gallery-img');

    function changeImage(step) {
        currentImage += step;
        
        // מעגל אינסופי (אחרי 7 חוזר ל-1 ולהיפך)
        if (currentImage > totalImages) currentImage = 1;
        if (currentImage < 1) currentImage = totalImages;
        
        // מחליף את מקור התמונה לנתיב יחסי נקי לחלוטין
        imgElement.src = 'slides/' + currentImage + '.jpg';
    }

    // חיבור לחיצות עכבר
    document.getElementById('btn-next').addEventListener('click', () => changeImage(1));
    document.getElementById('btn-prev').addEventListener('click', () => changeImage(-1));

    // חיבור חצי מקלדת
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') changeImage(1);
        if (e.key === 'ArrowLeft') changeImage(-1);
    });
</script>
</body>
</html>
